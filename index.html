<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OMO社区 - 云端作业系统 | 学生上传 教师批改</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #eef2f9 0%, #dce5f0 100%);
            min-height: 100vh;
            padding-bottom: 60px;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 24px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 26px;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            border-bottom: 2px solid #f0f2f8;
            padding-bottom: 12px;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .btn {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-warning { background: #FF8E53; }
        .btn-danger { background: #e74c3c; }
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            margin: 8px 0;
        }
        .homework-item {
            background: #f9fafc;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 5px solid #4A90E2;
        }
        .teacher-area {
            background: #fff9e8;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        @media (max-width: 700px) {
            .flex-between { flex-direction: column; align-items: stretch; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <span class="card-title"><i class="fas fa-cloud-upload-alt"></i> 学生作业提交</span>
            <button id="teacherModeBtn" class="btn btn-warning"><i class="fas fa-chalkboard-teacher"></i> 教师批改模式</button>
        </div>
        <div id="studentArea">
            <div>
                <label>你的姓名：</label>
               <input type="text" id="studentName" readonly style="background:#f0f2f8; cursor:not-allowed;" required>
            </div>
            <div>
                <label>选择作业：</label>
                <select id="assignmentSelect">
                    <option value="a1">垃圾分类小助手</option>
                    <option value="a2">迷宫游戏</option>
                </select>
            </div>
            <div>
                <label>上传 Scratch 文件 (.sb3)：</label>
                <input type="file" id="fileInput" accept=".sb3">
            </div>
            <button id="submitBtn" class="btn"><i class="fas fa-paper-plane"></i> 提交作业</button>
            <div id="studentMsg" style="margin-top: 12px;"></div>
        </div>
    </div>

    <!-- 教师批改区域 (默认隐藏) -->
    <div id="teacherArea" class="card hidden">
        <div class="card-header">
            <span class="card-title"><i class="fas fa-check-double"></i> 作业批改面板</span>
            <button id="closeTeacherBtn" class="btn">✖ 关闭</button>
        </div>
        <div id="homeworkList">加载中...</div>
    </div>
</div>

<script>
    // ================= 已替换为您的 Supabase 配置 =================
    const SUPABASE_URL = 'https://paoounfqmdaadrtvbhcb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhb291bmZxbWRhYWRydHZiaGNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTQ2MTMsImV4cCI6MjA5MzAzMDYxM30.J38Q6zjEYE5P3lYagCike0N7MO-l9PXNcYlZMk9_ey4';
    // =================================================================
   // 检查是否已登录（简易版）
   const loggedInUser = localStorage.getItem('loggedInUser');
   if (!loggedInUser) {
        // 没登录，跳回登录页
        window.location.href = 'login.html';
   }
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 教师密码（可自行修改）
    const TEACHER_PASSWORD = 'teacher123';

    const assignments = {
        a1: { title: "垃圾分类小助手", desc: "制作垃圾分类互动动画" },
        a2: { title: "迷宫游戏", desc: "角色从起点到终点，增加计时器" }
    };

    const studentArea = document.getElementById('studentArea');
    const teacherArea = document.getElementById('teacherArea');
    const teacherModeBtn = document.getElementById('teacherModeBtn');
    const closeTeacherBtn = document.getElementById('closeTeacherBtn');
    const submitBtn = document.getElementById('submitBtn');
    const studentNameInput = document.getElementById('studentName');
   // 自动填充登录的姓名
   if (loggedInUser) {
         studentNameInput.value = loggedInUser;
    }
    const assignmentSelect = document.getElementById('assignmentSelect');
    const fileInput = document.getElementById('fileInput');
    const studentMsg = document.getElementById('studentMsg');
    const homeworkListDiv = document.getElementById('homeworkList');

    teacherModeBtn.onclick = () => {
        const pwd = prompt('请输入教师密码：');
        if (pwd !== TEACHER_PASSWORD) {
            alert('密码错误，无权限查看');
            return;
        }
        studentArea.classList.add('hidden');
        teacherArea.classList.remove('hidden');
        loadAllHomeworks();
    };

    closeTeacherBtn.onclick = () => {
        teacherArea.classList.add('hidden');
        studentArea.classList.remove('hidden');
    };

    async function loadAllHomeworks() {
        homeworkListDiv.innerHTML = '<div class="teacher-area">加载中...</div>';
        const { data, error } = await supabase
            .from('homeworks')
            .select('*')
            .order('upload_time', { ascending: false });
        
        if (error) {
            homeworkListDiv.innerHTML = `<div class="teacher-area">❌ 加载失败: ${error.message}</div>`;
            return;
        }
        if (!data || data.length === 0) {
            homeworkListDiv.innerHTML = '<div class="teacher-area">📭 暂无学生提交作业</div>';
            return;
        }

        let html = '';
        for (let hw of data) {
            html += `
                <div class="homework-item" data-id="${hw.id}">
                    <div class="flex-between">
                        <div><strong>${escapeHtml(hw.student_name)}</strong> 提交了 <strong>${escapeHtml(hw.assignment_title)}</strong></div>
                        <div>${new Date(hw.upload_time).toLocaleString()}</div>
                    </div>
                    <div>📄 文件: ${escapeHtml(hw.file_name)}</div>
                    <div><a href="${hw.file_url}" target="_blank" class="btn" style="background:#2c3e50; display:inline-block; margin-top:8px;">⬇️ 下载文件</a></div>
                    <div style="margin-top:12px;">
                        <label>评分 (0-100): </label>
                        <input type="number" id="score_${hw.id}" value="${hw.score !== null ? hw.score : ''}" placeholder="不评分则留空" style="width:100px; display:inline; margin-right:12px;">
                        <label>教师评语: </label>
                        <input type="text" id="feedback_${hw.id}" value="${escapeHtml(hw.feedback || '')}" placeholder="写评语" style="width:250px; display:inline;">
                        <button class="btn save-grade-btn" data-id="${hw.id}" style="background:#27ae60;">💾 保存评分</button>
                    </div>
                </div>
            `;
        }
        homeworkListDiv.innerHTML = html;

        document.querySelectorAll('.save-grade-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = parseInt(btn.dataset.id);
                const scoreInput = document.getElementById(`score_${id}`);
                const feedbackInput = document.getElementById(`feedback_${id}`);
                const score = scoreInput.value ? parseInt(scoreInput.value) : null;
                const feedback = feedbackInput.value || null;
                
                const pwd = prompt('请输入教师密码以确认修改：');
                if (pwd !== TEACHER_PASSWORD) {
                    alert('密码错误，无法保存');
                    return;
                }

                const { error } = await supabase
                    .from('homeworks')
                    .update({ score: score, feedback: feedback })
                    .eq('id', id);
                
                if (error) {
                    alert('保存失败: ' + error.message);
                } else {
                    alert('已保存评分和评语');
                    loadAllHomeworks();
                }
            });
        });
    }

    submitBtn.onclick = async () => {
        const studentName = studentNameInput.value.trim();
        if (!studentName) {
            studentMsg.innerHTML = '<span style="color:red;">请填写姓名</span>';
            return;
        }
        const file = fileInput.files[0];
        if (!file) {
            studentMsg.innerHTML = '<span style="color:red;">请选择 .sb3 文件</span>';
            return;
        }
        if (!file.name.endsWith('.sb3')) {
            studentMsg.innerHTML = '<span style="color:red;">只支持 .sb3 文件</span>';
            return;
        }

        const assignmentId = assignmentSelect.value;
        const assignmentTitle = assignments[assignmentId].title;

        // 上传文件
        const fileName = `${Date.now()}_${studentName}_${file.name}`;
        const { data: uploadData, error: uploadError } = await supabase.storage
            .from('scratch-files')
            .upload(fileName, file);
        
        if (uploadError) {
            studentMsg.innerHTML = `<span style="color:red;">文件上传失败: ${uploadError.message}</span>`;
            return;
        }

        const { data: urlData } = supabase.storage
            .from('scratch-files')
            .getPublicUrl(fileName);
        const fileUrl = urlData.publicUrl;

        const { error: insertError } = await supabase
            .from('homeworks')
            .insert([
                {
                    student_name: studentName,
                    assignment_id: assignmentId,
                    assignment_title: assignmentTitle,
                    file_name: file.name,
                    file_url: fileUrl,
                    score: null,
                    feedback: null
                }
            ]);
        
        if (insertError) {
            studentMsg.innerHTML = `<span style="color:red;">提交失败: ${insertError.message}</span>`;
        } else {
            studentMsg.innerHTML = '<span style="color:green;">✅ 作业提交成功！教师将很快批改。</span>';
            fileInput.value = '';
        }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
