<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OMO作业系统</title>
    <style>
        body {
            background: linear-gradient(145deg, #eef2f9 0%, #dce5f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 20px 0;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }
        button {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        button:hover { opacity: 0.85; }
        .error { color: #e74c3c; margin-top: 12px; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>📚 学生登录</h2>
    <input type="text" id="studentName" placeholder="请输入你的真实姓名" autocomplete="off">
    <button onclick="login()">进入作业系统</button>
    <div id="errorMsg" class="error"></div>
</div>
<script>
    function login() {
        const name = document.getElementById('studentName').value.trim();
        if (name === "") {
            document.getElementById('errorMsg').innerText = "姓名不能为空";
            return;
        }
        localStorage.setItem('loggedInUser', name);
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
